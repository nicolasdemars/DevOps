services:
  database:
    build:
      context: ./database
    image: devops-database:1.0
    env_file:
      - ./simpleapi/.env
    volumes:
      - database-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./simpleapi
    image: java-simple-api:1.0
    env_file:
      - ./simpleapi/.env
    networks:
      app-network:
        aliases:
          - app
          - java-simple-api
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  front:
    build:
      context: ./devops-front-main
    image: devops-front:1.0
    networks:
      - app-network
    restart: unless-stopped

  httpd:
    build:
      context: ./httpd
    image: devops-httpd:1.0
    env_file:
      - ./simpleapi/.env
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - front
      - backend
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  database-data:
