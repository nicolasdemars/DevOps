name: CD devops 2025

on:
  workflow_run:
    workflows:
      - CI devops 2025
    branches:
      - main
    types:
      - completed

jobs:
  build-and-push-backend:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./TP1/simpleapi
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: true

  build-and-push-database:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./TP1/database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: true

  build-and-push-httpd:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./TP1/httpd
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: true

  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    needs:
      - build-and-push-backend
      - build-and-push-database
      - build-and-push-httpd
    runs-on: ubuntu-24.04
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/admin/tp-devops/TP1' }}
      SSH_HOST: ${{ secrets.SSH_HOST || vars.SSH_HOST || 'nicolas.demars.takima.school' }}
      SSH_USER: ${{ secrets.SSH_USER || secrets.SSH_USERNAME || vars.SSH_USER || vars.SSH_USERNAME || 'admin' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER || vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || vars.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB || vars.POSTGRES_DB }}
      SIMPLEAPI_HOST: ${{ secrets.SIMPLEAPI_HOST || vars.SIMPLEAPI_HOST || 'app' }}
      DB_HOST: ${{ secrets.DB_HOST || vars.DB_HOST || 'database' }}
      JAVA_HOST: ${{ secrets.JAVA_HOST || vars.JAVA_HOST || 'java-simple-api' }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || vars.SERVER_PORT || '8080' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check deployment configuration
        run: |
          missing=0

          if [ -z "$SSH_HOST" ]; then
            echo "::error::Missing SSH_HOST secret or variable."
            missing=1
          fi

          if [ -z "$SSH_USER" ]; then
            echo "::error::Missing SSH_USER secret or variable."
            missing=1
          fi

          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing SSH_PRIVATE_KEY secret. Add the private key that can connect to the server."
            missing=1
          fi

          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "::error::Missing DOCKERHUB_USERNAME secret."
            missing=1
          fi

          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Missing DOCKERHUB_TOKEN secret."
            missing=1
          fi

          if [ -z "$POSTGRES_USER" ] || [ -z "$POSTGRES_PASSWORD" ] || [ -z "$POSTGRES_DB" ]; then
            echo "::error::Missing POSTGRES_USER, POSTGRES_PASSWORD or POSTGRES_DB secret."
            missing=1
          fi

          exit "$missing"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install ansible-core

      - name: Create Ansible inventory
        run: |
          {
            printf '[prod]\n'
            printf '%s ansible_user=%s ansible_ssh_private_key_file=%s ansible_python_interpreter=/usr/bin/python3\n' "$SSH_HOST" "$SSH_USER" "$HOME/.ssh/deploy_key"
          } > ansible/inventory.ini

      - name: Deploy with Ansible
        run: ansible-playbook -i ansible/inventory.ini ansible/deploy.yml
