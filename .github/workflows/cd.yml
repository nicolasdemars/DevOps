name: CD devops 2025

on:
  workflow_run:
    workflows:
      - CI devops 2025
    branches:
      - main
    types:
      - completed

jobs:
  build-and-push-images:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        run: |
          push_with_retry() {
            image="$1"

            for attempt in 1 2 3 4 5; do
              if docker push "$image"; then
                return 0
              fi

              echo "Push failed for $image, attempt $attempt/5."
              sleep 15
            done

            return 1
          }

          backend_image="$DOCKERHUB_USERNAME/tp-devops-simple-api:latest"
          database_image="$DOCKERHUB_USERNAME/tp-devops-database:latest"
          front_image="$DOCKERHUB_USERNAME/tp-devops-front:latest"
          httpd_image="$DOCKERHUB_USERNAME/tp-devops-httpd:latest"

          docker build --pull -t "$backend_image" ./TP1/simpleapi
          push_with_retry "$backend_image"

          docker build --pull -t "$database_image" ./TP1/database
          push_with_retry "$database_image"

          docker build --pull -t "$front_image" ./TP1/devops-front-main
          push_with_retry "$front_image"

          docker build --pull -t "$httpd_image" ./TP1/httpd
          push_with_retry "$httpd_image"
